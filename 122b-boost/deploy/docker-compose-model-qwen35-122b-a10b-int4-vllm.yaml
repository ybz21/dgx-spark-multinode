# Qwen3.5-122B-A10B INT4 AutoRound (Intel) - vLLM only
# 用法: cd ~/lm_scripts && docker compose -f docker-compose-model-qwen35-122b-a10b-int4-vllm.yaml up -d
# 端口: 30000
# 权重: ~61GB; GPU mem util 0.80 (DGX Spark 统一内存 119GB)
# 注意: 与 35B compose 互斥, 不能同时启动
# 依赖 parser: services/qwen3_nothink_reasoning_parser_vllm.py

services:
  vllm:
    image: vllm-qwen35-v2
    container_name: vllm-qwen35
    restart: unless-stopped
    ipc: host
    ports:
      - "30000:30000"
    security_opt:
      - label=disable
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      - /home/ai/models:/models
      - ./services/qwen3_nothink_reasoning_parser_vllm.py:/custom/qwen3_nothink_reasoning_parser_vllm.py:ro
    entrypoint: ["/opt/entrypoint.sh"]
    command:
      - serve
      - /models/Qwen3.5-122B-A10B-int4-AutoRound-Intel
      - --served-model-name
      - qwen3.5-122b-int4
      - --port
      - "30000"
      - --max-model-len
      - "131072"
      - --gpu-memory-utilization
      - "0.80"
      - --reasoning-parser-plugin
      - /custom/qwen3_nothink_reasoning_parser_vllm.py
      - --reasoning-parser
      - qwen3_nothink
      - --attention-backend
      - FLASHINFER
      - --enable-auto-tool-choice
      - --tool-call-parser
      - qwen3_coder
      - --trust-remote-code
      - --speculative-config
      - '{"method":"mtp","num_speculative_tokens":2}'
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:30000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 900s
