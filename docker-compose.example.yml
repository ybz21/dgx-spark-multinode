# DGX Spark 多节点推理 - Docker Compose 示例
# 此文件仅供参考，实际运行时由 deploy.sh 根据 .env 自动生成
#
# 手动使用:
#   节点1 (HEAD):   docker compose -f docker-compose.node0.yml up -d
#   节点2 (WORKER): docker compose -f docker-compose.node1.yml up -d
#
# 以下为 HEAD 节点 (rank 0) 的示例配置:

services:
  sglang-head:
    image: nvcr.io/nvidia/sglang:26.03-py3
    container_name: sglang-multinode-head
    restart: unless-stopped
    network_mode: host
    ipc: host
    shm_size: "32g"
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - /home/ai/models/YOUR_MODEL:/model:ro
      # 可选: 挂载自定义 patch 脚本
      # - /path/to/custom_reasoning_detector.py:/custom/custom_reasoning_detector.py
      # - /path/to/entrypoint.sh:/custom/entrypoint.sh
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      # NCCL 通信配置 — 指定光缆所在的网卡接口
      - NCCL_SOCKET_IFNAME=enp1s0f0np0
      - NCCL_IB_DISABLE=0
      - NCCL_NET_GDR_LEVEL=5
      - NCCL_IB_HCA=rocep1s0f0
      - NCCL_DEBUG=WARN
      # Gloo 分布式通信
      - GLOO_SOCKET_IFNAME=enp1s0f0np0
      - MASTER_ADDR=10.10.10.1
      - MASTER_PORT=29500
    # 可选: 自定义 entrypoint 用于 patch SGLang
    # entrypoint: ["/custom/entrypoint.sh"]
    command: >
      python3 -m sglang.launch_server
      --model-path /model
      --tp 2
      --nnodes 2
      --node-rank 0
      --nccl-init-addr 10.10.10.1:29500
      --host 0.0.0.0
      --port 30000
      --attention-backend triton
      --mem-fraction-static 0.8
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

# WORKER 节点 (rank 1) 的配置与 HEAD 相同，仅修改:
#   --node-rank 1
#   container_name: sglang-multinode-worker-1
#   NCCL_SOCKET_IFNAME / GLOO_SOCKET_IFNAME: 该节点光缆所在的接口名
#   NCCL_IB_HCA: 对应的 RDMA 设备名
