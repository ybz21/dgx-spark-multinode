# cc-proxy (Claude Code proxy, 独立)
# 用法: cd ~/lm_scripts && docker compose -f docker-compose-proxy-cc.yaml up -d
# 端口: 30021 -> upstream http://localhost:30000/v1 (vllm)

services:
  cc-proxy:
    image: docker.1ms.run/python:3.12-slim
    container_name: cc-proxy
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=30021
      - UPSTREAM=http://localhost:30000/v1
      - MODEL_OVERRIDE=qwen3.5-122b-int4
    volumes:
      - ./services/cc_proxy.py:/app/cc_proxy.py
    working_dir: /app
    command: >
      sh -c "pip install -q fastapi uvicorn httpx && python cc_proxy.py"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import urllib.request,sys; sys.exit(0 if urllib.request.urlopen(\"http://localhost:30021/health\").status==200 else 1)'"]
      interval: 10s
      timeout: 3s
      retries: 5
