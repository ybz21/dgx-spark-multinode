# 节点 2 (WORKER, rank 1) — 由 deploy.sh 自动生成，此文件仅供参考
# 与节点 1 的区别: node-rank=1, 接口名/RDMA 可能不同 (取决于光缆插口)

services:
  sglang-worker-1:
    image: nvcr.io/nvidia/sglang:26.03-py3
    container_name: sglang-multinode-worker-1
    restart: unless-stopped
    network_mode: host
    ipc: host
    shm_size: "32g"
    ulimits:
      memlock: -1
      stack: 67108864
    volumes:
      - /home/ai/models/YOUR_MODEL:/model:ro
      # 可选: 挂载自定义 patch 脚本
      # - /path/to/custom_reasoning_detector.py:/custom/custom_reasoning_detector.py
      # - /path/to/entrypoint.sh:/custom/entrypoint.sh
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      # 注意: 这台机器光缆可能插在不同的口!
      # 例如节点1插在 enp1s0f0np0，节点2插在 enp1s0f1np1
      # deploy.sh 会自动检测并设置正确的值
      - NCCL_SOCKET_IFNAME=enp1s0f1np1
      - NCCL_IB_DISABLE=0
      - NCCL_NET_GDR_LEVEL=5
      - NCCL_IB_HCA=rocep1s0f1
      - NCCL_DEBUG=WARN
      - GLOO_SOCKET_IFNAME=enp1s0f1np1
      # 始终指向 HEAD 节点的高速网 IP
      - MASTER_ADDR=10.10.10.1
      - MASTER_PORT=29500
    # 可选: 自定义 entrypoint
    # entrypoint: ["/custom/entrypoint.sh"]
    command: >
      python3 -m sglang.launch_server
      --model-path /model
      --tp 2
      --nnodes 2
      --node-rank 1
      --nccl-init-addr 10.10.10.1:29500
      --host 0.0.0.0
      --port 30000
      --attention-backend triton
      --mem-fraction-static 0.8
      --trust-remote-code
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
