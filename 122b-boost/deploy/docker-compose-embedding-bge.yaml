# BGE Embedding Server (独立)
# 用法: cd ~/lm_scripts && docker compose -f docker-compose-embedding-bge.yaml up -d
# 端口: 30010
# 注: embedding-server:latest 镜像需支持 PORT 环境变量; 当前镜像在本机不存在, 需先 pull/build

services:
  embedding:
    image: embedding-server:latest
    container_name: embedding-server
    restart: unless-stopped
    network_mode: host
    environment:
      - PORT=30010
      - MODEL_PATH=/model
    volumes:
      - /home/ai/models/bge-large-zh-v1.5:/model
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:30010/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 30s
